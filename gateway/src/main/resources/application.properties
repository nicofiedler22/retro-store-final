spring.application.name=gateway

server.port=9999

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=login
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://login
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=autenticador
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://autenticador
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/autenticadores/**